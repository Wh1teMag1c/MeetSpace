services:
  db:
    image: postgres:15-alpine
    volumes:
      - office_postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    restart: always

  backend:
    build:
      context: ./backend
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    restart: always

  frontend:
    build:
      context: ./frontend
    volumes:
      - frontend_build:/app/build-volume
    restart: always

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/backend/static:ro
      - media_volume:/var/www/backend/media:ro
      - frontend_build:/var/www/frontend:ro
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  office_postgres_data:
  static_volume:
  media_volume:
  frontend_build: